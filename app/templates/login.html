<!DOCTYPE html>

<html class="dark" lang="en">

<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<title>Retro User Authentication - Old School Games</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
		rel="stylesheet" />
	<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800;900&amp;display=swap"
		rel="stylesheet" />
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
		rel="stylesheet" />
	<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"primary": "#0d59f2",
						"retro-green": "#4ade80",
						"background-light": "#f5f6f8",
						"background-dark": "#101622",
					},
					fontFamily: {
						"display": ["Spline Sans", "sans-serif"]
					},
					borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
				},
			},
		}
	</script>
	<script src="/static/js/auth/auth.js"></script>
	<style>
		.retro-window {
			border: 4px solid #3b4354;
			box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 0.5);
		}

		.pixel-border {
			image-rendering: pixelated;
		}
	</style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
	<div
		class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
		<div class="layout-container flex h-full grow flex-col">
			<header
				class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3 bg-background-light dark:bg-background-dark">
				<div class="flex items-center gap-4">
					<div class="text-primary size-6 flex items-center justify-center">
						<span class="material-symbols-outlined text-3xl">videogame_asset</span>
					</div>
					<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">
						Old School Games</h2>
				</div>
				<div class="flex flex-1 justify-end gap-8">
					<div class="flex items-center gap-9">
						<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
							href="#">Play</a>
						<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
							href="#">High Scores</a>
						<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
							href="#">Library</a>
					</div>
					<button
						class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold tracking-[0.015em]">
						<span class="truncate">Help</span>
					</button>
				</div>
			</header>
			<main class="flex flex-1 items-center justify-center p-4 md:p-10">
				<div
					class="retro-window w-full max-w-[800px] bg-slate-100 dark:bg-slate-900 flex flex-col overflow-hidden">
					<div
						class="bg-primary px-4 py-2 flex items-center justify-between border-b-4 border-slate-300 dark:border-slate-700">
						<div class="flex items-center gap-2">
							<span class="material-symbols-outlined text-white text-sm">settings_input_component</span>
							<span
								class="text-white text-sm font-bold tracking-wider uppercase">User_Profile_Login.exe</span>
						</div>
						<div class="flex gap-1">
							<div
								class="w-5 h-5 bg-slate-200 dark:bg-slate-800 border-2 border-slate-400 flex items-center justify-center">
								<span class="material-symbols-outlined text-xs text-slate-600">minimize</span>
							</div>
							<div
								class="w-5 h-5 bg-slate-200 dark:bg-slate-800 border-2 border-slate-400 flex items-center justify-center">
								<span
									class="material-symbols-outlined text-xs text-slate-600">check_box_outline_blank</span>
							</div>
							<div class="w-5 h-5 bg-red-500 border-2 border-red-700 flex items-center justify-center">
								<span class="material-symbols-outlined text-xs text-white">close</span>
							</div>
						</div>
					</div>
					<form id="login-form" onsubmit="login(event)">
						<div class="p-8 flex flex-col md:flex-row gap-8">
							<div class="flex-1 space-y-6">
								<div class="space-y-2">
									<h1
										class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-tight uppercase">
										INICIA SESSIÓ</h1>
								</div>
								<div class="space-y-4">
									<label class="flex flex-col gap-2">
										<span
											class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-widest">USUARI</span>
										<div class="relative">
											<span
												class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
											<input
												class="w-full bg-slate-200 dark:bg-slate-800 border-4 border-slate-300 dark:border-slate-700 focus:border-primary px-10 py-3 text-slate-900 dark:text-slate-100 font-bold placeholder:text-slate-500 outline-none"
												placeholder="pepito" type="text" name="username" id="username" />
										</div>
									</label>
									<label class="flex flex-col gap-2">
										<span
											class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-widest">CONTRASENYA</span>
										<div class="relative">
											<span
												class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
											<input
												class="w-full bg-slate-200 dark:bg-slate-800 border-4 border-slate-300 dark:border-slate-700 focus:border-primary px-10 py-3 text-slate-900 dark:text-slate-100 font-bold placeholder:text-slate-500 outline-none"
												placeholder="**********" type="password" name="password"
												id="password" />
										</div>
									</label>
								</div>
								<div class="flex items-center gap-4 pt-4">
									<button type="submit"
										class="flex-1 bg-retro-green hover:bg-green-500 text-slate-900 font-black py-4 px-6 flex items-center justify-center gap-3 border-b-4 border-green-800 active:border-b-0 active:translate-y-1 transition-all">
										<span class="material-symbols-outlined">keyboard_return</span>
										LOGIN
									</button>
									<a href="/auth/register"
										class="bg-slate-300 dark:bg-slate-700 hover:bg-slate-400 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 font-bold py-4 px-6 border-b-4 border-slate-500 active:border-b-0 active:translate-y-1 transition-all">
										REGISTRAR-SE
									</a>
								</div>
							</div>
						</div>
						<div
							class="bg-slate-200 dark:bg-slate-800 px-4 py-2 border-t-4 border-slate-300 dark:border-slate-700 flex justify-between items-center text-[10px] uppercase font-bold text-slate-500">
							<span>Terminal: 127.0.0.1</span>
							<span>OS v9.0.2 - Protected Session</span>
						</div>
					</form>
				</div>
			</main>
			<footer class="p-8 text-center text-slate-500 text-xs uppercase tracking-[0.2em]">
				© 1994-1998 Old School Games Corporation. All rights reserved.
			</footer>
		</div>
	</div>
</body>

</html>
